name: CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Compile (tsc)
        run: pnpm exec tsc -p tsconfig.json

      - name: Lint
        if: ${{ hashFiles('.eslintrc.cjs', '.eslintrc.js', '.eslintrc.json', '.eslintrc.yml', '.eslintrc.yaml') != '' }}
        run: pnpm lint

      - name: Test (vitest)
        run: pnpm test

      - name: Package VSIX
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: npx --yes @vscode/vsce package --no-dependencies

      - name: Upload VSIX artifact
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: actions/upload-artifact@v7
        with:
          name: buildr-ide-vsix
          path: "*.vsix"

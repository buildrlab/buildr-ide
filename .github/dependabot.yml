version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "dev"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
    groups:
      npm-root:
        patterns:
          - "*"
    commit-message:
      prefix: "deps"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    target-branch: "dev"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "deps(actions)"

